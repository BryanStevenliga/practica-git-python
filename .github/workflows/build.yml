name: Python RPG Build

on:
  push:
    branches: [ main, feature-* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies (Instalar paquetes)
      run: |
        python -m pip install --upgrade pip
        # Aquí se instalarían paquetes si se usara un archivo requirements.txt

    - name: Compile / Syntax check
      run: |
        python -m py_compile personaje.py enemigo.py principal.py
